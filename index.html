<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman Responsif</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      header {
        background-color: #333;
        color: #fff;
        text-align: center;
        padding: 10px;
      }

      footer {
        background-color: #333;
        color: #fff;
        text-align: center;
        padding: 10px;
        position: fixed;
        bottom: 0;
        width: 100%;
      }

      .content {
        padding: 20px;
      }

      .button-container {
        text-align: center;
      }

      .button {
        display: inline-block;
        padding: 10px 20px;
        font-size: 16px;
        margin: 10px;
        background-color: #4caf50;
        color: #fff;
        text-decoration: none;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }

      @media screen and (max-width: 600px) {
        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Header</h1>
    </header>

    <div class="content">
      <div class="button-container">
        <button class="button">Button 1</button>
        <button class="button">Button 2</button>
      </div>
    </div>

    <footer>
      <p>Footer</p>
    </footer>
  </body>
</html>
